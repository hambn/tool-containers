name: ai/claude-code

on:
  push:
    branches: [main]
    paths: ["ai/claude-code/**", ".github/workflows/ai-claude-code.yml"]
  schedule:
    - cron: "0 4 * * *"        # nightly: rebuild latest + re-scan for CVE patches
  workflow_dispatch:

env:
  THING: ai/claude-code
  IMAGE: claude-code
  PRIMARY: node-alpine-minimal   # this variant owns unsuffixed tags (latest, <version>)

jobs:
  # Auto-discover variants from images/ subdirs → no hardcoded matrix.
  discover:
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.list.outputs.variants }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          variants=$(ls -d "$THING"/images/*/ | xargs -n1 basename | jq -R . | jq -cs .)
          echo "variants=$variants" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # GHCR push
    strategy:
      matrix:
        variant: ${{ fromJSON(needs.discover.outputs.variants) }}
    steps:
      - uses: actions/checkout@v4

      # Resolve upstream npm version → drives image tags.
      - name: Resolve version
        id: ver
        run: |
          echo "version=$(npm view @anthropic-ai/claude-code version)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ponytail: Quay disabled for now — re-enable when the account/secrets exist.
      # - name: Login Quay
      #   uses: docker/login-action@v3
      #   with:
      #     registry: quay.io
      #     username: ${{ secrets.QUAY_USERNAME }}
      #     password: ${{ secrets.QUAY_TOKEN }}

      # primary variant → latest/<version>; others → <variant>/<version>-<variant>.
      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}
            # quay.io/${{ secrets.QUAY_USERNAME }}/${{ env.IMAGE }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.variant == env.PRIMARY }}
            type=raw,value=${{ matrix.variant }},enable=${{ matrix.variant != env.PRIMARY }}
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.version }}-${{ steps.ver.outputs.date }}
            type=sha,prefix=sha-

      - name: Build & push ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.THING }}/images/${{ matrix.variant }}
          platforms: linux/amd64,linux/arm64
          build-args: CLAUDE_CODE_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          severity: HIGH,CRITICAL
          exit-code: "0"        # report only; flip to "1" to fail on findings
