name: ai/claude-code

# Build triggers (never a blind daily rebuild):
#   1. workflow_dispatch          → manual, builds all variants
#   2. push to images/<variant>/  → builds only the changed variants
#   3. new claude-code release     → tool-update job (scheduled) rebuilds all
#   4. base image digest drift     → base-update job (scheduled) rebuilds affected variants
on:
  push:
    branches: [main]
    paths: ["ai/claude-code/**", ".github/workflows/ai-claude-code.yml"]
  schedule:
    - cron: "0 4 * * *"        # detection only — builds nothing unless an update is found
  workflow_dispatch:

env:
  THING: ai/claude-code
  IMAGE: claude-code
  PRIMARY: node-alpine-minimal  # this variant owns unsuffixed tags (latest, <version>)
  PKG: "@anthropic-ai/claude-code"

jobs:
  # Parse everything once: variant list, each variant's resolved base ref, upstream version.
  discover:
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.d.outputs.all }}
      bases: ${{ steps.d.outputs.bases }}
      version: ${{ steps.d.outputs.version }}
      date: ${{ steps.d.outputs.date }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        run: |
          set -euo pipefail
          # Resolve a Dockerfile FROM to a concrete ref (substitutes ${ARG} defaults).
          resolve_base() {
            df="$THING/images/$1/Dockerfile"
            ref=$(grep -m1 -iE '^FROM ' "$df" | awk '{print $2}')
            while echo "$ref" | grep -q '\${'; do
              var=$(echo "$ref" | sed -E 's/.*\$\{([A-Za-z_][A-Za-z0-9_]*)\}.*/\1/')
              def=$(grep -m1 -E "^ARG $var=" "$df" | cut -d= -f2)
              ref=$(echo "$ref" | sed "s#\${$var}#$def#g")
            done
            echo "$ref"
          }
          all=$(ls -d "$THING"/images/*/ | xargs -n1 basename)
          bases='{}'
          for v in $all; do
            bases=$(echo "$bases" | jq --arg k "$v" --arg val "$(resolve_base "$v")" '. + {($k):$val}')
          done
          echo "all=$(printf '%s\n' $all | jq -R . | jq -cs .)" >> "$GITHUB_OUTPUT"
          echo "bases=$(echo "$bases" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "version=$(npm view "$PKG" version)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

  # Trigger 2: push → only variants whose images/<variant>/ changed (workflow change → all).
  changed:
    if: github.event_name == 'push'
    needs: discover
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.c.outputs.variants }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: c
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          ALL: ${{ needs.discover.outputs.all }}
        run: |
          set -euo pipefail
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "variants=$ALL" >> "$GITHUB_OUTPUT"; exit 0
          fi
          diff=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || echo __ALL__)
          if [ "$diff" = __ALL__ ] || printf '%s\n' "$diff" | grep -q '^\.github/workflows/'; then
            echo "variants=$ALL" >> "$GITHUB_OUTPUT"; exit 0
          fi
          sel=""
          for v in $(echo "$ALL" | jq -r '.[]'); do
            printf '%s\n' "$diff" | grep -q "^$THING/images/$v/" && sel="$sel $v" || true
          done
          echo "variants=$(printf '%s\n' $sel | sed '/^$/d' | jq -R . | jq -cs 'unique')" >> "$GITHUB_OUTPUT"

  # Trigger 3: scheduled — new claude-code version vs the version baked on :latest → rebuild all.
  tool-update:
    if: github.event_name == 'schedule'
    needs: discover
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    outputs:
      variants: ${{ steps.t.outputs.variants }}
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - id: t
        env:
          VERSION: ${{ needs.discover.outputs.version }}
          ALL: ${{ needs.discover.outputs.all }}
        run: |
          set -euo pipefail
          img="ghcr.io/${{ github.repository_owner }}/$IMAGE"
          # ponytail: fail-safe — inspect error → treat as changed, rebuild. Never skip silently.
          old=$(docker buildx imagetools inspect "$img:latest" \
            --format '{{ index .Image.Config.Labels "io.tool-containers.claude-version" }}' 2>/dev/null || echo none)
          if [ "$old" != "$VERSION" ]; then
            echo "claude-code: $old -> $VERSION"; echo "variants=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "claude-code up to date ($VERSION)"; echo "variants=[]" >> "$GITHUB_OUTPUT"
          fi

  # Trigger 4: scheduled — base image digest drift vs the digest baked on each variant → rebuild those.
  base-update:
    if: github.event_name == 'schedule'
    needs: discover
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    outputs:
      variants: ${{ steps.b.outputs.variants }}
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - id: b
        env:
          BASES: ${{ needs.discover.outputs.bases }}
        run: |
          set -euo pipefail
          img="ghcr.io/${{ github.repository_owner }}/$IMAGE"
          drift=""
          for v in $(echo "$BASES" | jq -r 'keys[]'); do
            base=$(echo "$BASES" | jq -r --arg k "$v" '.[$k]')
            cur=$(docker buildx imagetools inspect "$base" --format '{{.Manifest.Digest}}' 2>/dev/null || echo err)
            tag=$([ "$v" = "$PRIMARY" ] && echo latest || echo "$v")
            old=$(docker buildx imagetools inspect "$img:$tag" \
              --format '{{ index .Image.Config.Labels "io.tool-containers.base-digest" }}' 2>/dev/null || echo missing)
            if [ "$cur" != "$old" ]; then echo "$v base: $old -> $cur"; drift="$drift $v"; fi
          done
          echo "variants=$(printf '%s\n' $drift | sed '/^$/d' | jq -R . | jq -cs 'unique')" >> "$GITHUB_OUTPUT"

  # Union the trigger outputs into the final build matrix (dispatch → all).
  merge:
    needs: [discover, changed, tool-update, base-update]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.m.outputs.variants }}
    steps:
      - id: m
        env:
          EVENT: ${{ github.event_name }}
          ALL: ${{ needs.discover.outputs.all }}
          A: ${{ needs.changed.outputs.variants }}
          B: ${{ needs.tool-update.outputs.variants }}
          C: ${{ needs.base-update.outputs.variants }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = workflow_dispatch ]; then
            echo "variants=$ALL" >> "$GITHUB_OUTPUT"; exit 0
          fi
          a="${A:-[]}"; b="${B:-[]}"; c="${C:-[]}"
          echo "variants=$(jq -cn --argjson a "$a" --argjson b "$b" --argjson c "$c" '($a+$b+$c)|unique')" >> "$GITHUB_OUTPUT"

  build:
    needs: [discover, merge]
    if: needs.merge.outputs.variants != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # GHCR push
    strategy:
      fail-fast: false          # one variant failing must not cancel the others
      matrix:
        variant: ${{ fromJSON(needs.merge.outputs.variants) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # ponytail: amd64 only — Node/npm SIGILL (exit 132) under QEMU arm64 emulation.
      #           Add arm64 via native ubuntu-24.04-arm runners + manifest merge when needed.

      - name: Resolve base digest
        id: base
        env:
          BASES: ${{ needs.discover.outputs.bases }}
        run: |
          base=$(echo "$BASES" | jq -r --arg k "${{ matrix.variant }}" '.[$k]')
          echo "digest=$(docker buildx imagetools inspect "$base" --format '{{.Manifest.Digest}}')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ponytail: Quay disabled for now — re-enable when the account/secrets exist.
      # - name: Login Quay
      #   uses: docker/login-action@v3
      #   with:
      #     registry: quay.io
      #     username: ${{ secrets.QUAY_USERNAME }}
      #     password: ${{ secrets.QUAY_TOKEN }}

      # primary → latest/<version>; others → <variant>/<version>-<variant>.
      # claude-version + base-digest labels feed the scheduled update-check jobs.
      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}
            # quay.io/${{ secrets.QUAY_USERNAME }}/${{ env.IMAGE }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.variant == env.PRIMARY }}
            type=raw,value=${{ matrix.variant }},enable=${{ matrix.variant != env.PRIMARY }}
            type=raw,value=${{ needs.discover.outputs.version }}
            type=raw,value=${{ needs.discover.outputs.version }}-${{ needs.discover.outputs.date }}
            type=sha,prefix=sha-
          labels: |
            io.tool-containers.claude-version=${{ needs.discover.outputs.version }}
            io.tool-containers.base-digest=${{ steps.base.outputs.digest }}

      - name: Build & push ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.THING }}/images/${{ matrix.variant }}
          platforms: linux/amd64
          provenance: false     # keep a plain image manifest so label reads (update check) work
          build-args: CLAUDE_CODE_VERSION=${{ needs.discover.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:${{ needs.discover.outputs.version }}${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          severity: HIGH,CRITICAL
          exit-code: "0"        # report only; flip to "1" to fail on findings
