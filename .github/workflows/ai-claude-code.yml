name: ai/claude-code

# Build triggers (never a blind daily rebuild):
#   1. workflow_dispatch          → manual, builds all variants
#   2. push to images/<variant>/  → builds only the changed variants
#   3. new claude-code release     → scheduled tool check rebuilds all
#   4. base image digest drift     → scheduled base check rebuilds affected variants
on:
  push:
    branches: [main]
    paths: ["ai/claude-code/**", ".github/workflows/ai-claude-code.yml"]
  schedule:
    - cron: "0 4 * * *"        # detection only — builds nothing unless an update is found
  workflow_dispatch:

env:
  THING: ai/claude-code
  IMAGE: claude-code
  PRIMARY: node-alpine-minimal  # this variant owns unsuffixed tags (latest, <version>)
  PKG: "@anthropic-ai/claude-code"

jobs:
  # Single planning job: discover variants + resolve version + decide what to build.
  #   push     → variants whose images/<variant>/ changed (workflow change → all)
  #   dispatch → all
  #   schedule → all if a new claude-code release; else only variants whose base drifted
  # Outputs feed the build matrix; `build` is the on/off gate (avoids JSON-compare in `if`).
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read            # read labels off published images (update check)
    outputs:
      variants: ${{ steps.p.outputs.variants }}
      build: ${{ steps.p.outputs.build }}
      version: ${{ steps.p.outputs.version }}
      date: ${{ steps.p.outputs.date }}
      bases: ${{ steps.p.outputs.bases }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }   # need previous commit to diff on push
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }

      - id: p
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          img="ghcr.io/${{ github.repository_owner }}/$IMAGE"

          # Resolve a Dockerfile FROM to a concrete ref (substitutes ${ARG} defaults).
          resolve_base() {
            df="$THING/images/$1/Dockerfile"
            ref=$(grep -m1 -iE '^FROM ' "$df" | awk '{print $2}')
            while echo "$ref" | grep -q '\${'; do
              var=$(echo "$ref" | sed -E 's/.*\$\{([A-Za-z_][A-Za-z0-9_]*)\}.*/\1/')
              def=$(grep -m1 -E "^ARG $var=" "$df" | cut -d= -f2)
              ref=$(echo "$ref" | sed "s#\${$var}#$def#g")
            done
            echo "$ref"
          }
          tag_of() { [ "$1" = "$PRIMARY" ] && echo latest || echo "$1"; }

          all=$(ls -d "$THING"/images/*/ | xargs -n1 basename)
          version=$(npm view "$PKG" version)

          # variant -> base ref map (also used by the build job to bake the base-digest label).
          bases='{}'
          for v in $all; do
            bases=$(echo "$bases" | jq --arg k "$v" --arg val "$(resolve_base "$v")" '. + {($k):$val}')
          done

          selected=""
          case "$EVENT" in
            workflow_dispatch)
              selected="$all" ;;
            push)
              if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
                selected="$all"
              else
                diff=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || echo __ALL__)
                if [ "$diff" = __ALL__ ] || printf '%s\n' "$diff" | grep -q '^\.github/workflows/'; then
                  selected="$all"
                else
                  for v in $all; do
                    printf '%s\n' "$diff" | grep -q "^$THING/images/$v/" && selected="$selected $v" || true
                  done
                fi
              fi ;;
            schedule)
              # ponytail: fail-safe — any inspect error falls through to "rebuild", never skips silently.
              old_ver=$(docker buildx imagetools inspect "$img:latest" \
                --format '{{ index .Image.Config.Labels "io.tool-containers.claude-version" }}' 2>/dev/null || echo none)
              if [ "$old_ver" != "$version" ]; then
                echo "claude-code: $old_ver -> $version"; selected="$all"
              else
                for v in $all; do
                  cur=$(docker buildx imagetools inspect "$(resolve_base "$v")" \
                    --format '{{.Manifest.Digest}}' 2>/dev/null || echo err)
                  old=$(docker buildx imagetools inspect "$img:$(tag_of "$v")" \
                    --format '{{ index .Image.Config.Labels "io.tool-containers.base-digest" }}' 2>/dev/null || echo missing)
                  if [ "$cur" != "$old" ]; then echo "$v base: $old -> $cur"; selected="$selected $v"; fi
                done
              fi ;;
          esac

          variants=$(printf '%s\n' $selected | sed '/^$/d' | jq -R . | jq -cs 'unique')
          echo "will build: $variants"
          {
            echo "variants=$variants"
            echo "bases=$(echo "$bases" | jq -c .)"
            echo "version=$version"
            echo "date=$(date -u +%Y%m%d)"
            if [ "$variants" = "[]" ]; then echo "build=false"; else echo "build=true"; fi
          } >> "$GITHUB_OUTPUT"

  # One job instance per (registry, variant): each logs in and pushes to its own registry.
  # Add a registry = add it to the matrix + a login step below.
  build:
    needs: plan
    if: needs.plan.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # GHCR push
    strategy:
      fail-fast: false          # one variant/registry failing must not cancel the others
      matrix:
        registry: [ghcr, dockerhub]
        variant: ${{ fromJSON(needs.plan.outputs.variants) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # ponytail: amd64 only — Node/npm SIGILL (exit 132) under QEMU arm64 emulation.
      #           Add arm64 via native ubuntu-24.04-arm runners + manifest merge when needed.
      # ponytail: each registry rebuilds from the shared per-variant gha cache (cache hit ≈ free),
      #           the price of keeping registries in isolated jobs.

      - name: Registry image ref
        id: img
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          case "${{ matrix.registry }}" in
            ghcr)     echo "ref=ghcr.io/${{ github.repository_owner }}/$IMAGE" >> "$GITHUB_OUTPUT" ;;
            dockerhub) echo "ref=docker.io/$DH_USER/$IMAGE" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Login GHCR
        if: matrix.registry == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        if: matrix.registry == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ponytail: Quay disabled for now — add 'quay' to the matrix + a login step to re-enable.
      # - name: Login Quay
      #   if: matrix.registry == 'quay'
      #   uses: docker/login-action@v3
      #   with:
      #     registry: quay.io
      #     username: ${{ secrets.QUAY_USERNAME }}
      #     password: ${{ secrets.QUAY_TOKEN }}

      - name: Resolve base digest
        id: base
        env:
          BASES: ${{ needs.plan.outputs.bases }}
        run: |
          base=$(echo "$BASES" | jq -r --arg k "${{ matrix.variant }}" '.[$k]')
          echo "digest=$(docker buildx imagetools inspect "$base" --format '{{.Manifest.Digest}}')" >> "$GITHUB_OUTPUT"

      # primary → latest/<version>; others → <variant>/<version>-<variant>.
      # claude-version + base-digest labels feed the scheduled update check.
      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.ref }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.variant == env.PRIMARY }}
            type=raw,value=${{ matrix.variant }},enable=${{ matrix.variant != env.PRIMARY }}
            type=raw,value=${{ needs.plan.outputs.version }}
            type=raw,value=${{ needs.plan.outputs.version }}-${{ needs.plan.outputs.date }}
            type=sha,prefix=sha-
          labels: |
            io.tool-containers.claude-version=${{ needs.plan.outputs.version }}
            io.tool-containers.base-digest=${{ steps.base.outputs.digest }}

      - name: Build & push ${{ matrix.variant }} → ${{ matrix.registry }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.THING }}/images/${{ matrix.variant }}
          platforms: linux/amd64
          provenance: false     # keep a plain image manifest so label reads (update check) work
          build-args: CLAUDE_CODE_VERSION=${{ needs.plan.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      # Scan once, on the GHCR push.
      - name: Trivy scan
        if: matrix.registry == 'ghcr'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ needs.plan.outputs.version }}${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          severity: HIGH,CRITICAL
          exit-code: "0"        # report only; flip to "1" to fail on findings
