name: ai/claude-code

on:
  push:
    branches: [main]
    paths: ["ai/claude-code/**", ".github/workflows/ai-claude-code.yml"]
  schedule:
    - cron: "0 4 * * *"        # daily: rebuild only if claude-code or a base image changed
  workflow_dispatch:            # manual: always rebuild everything

env:
  THING: ai/claude-code
  IMAGE: claude-code
  PRIMARY: node-alpine-minimal  # this variant owns unsuffixed tags (latest, <version>)
  PKG: "@anthropic-ai/claude-code"

jobs:
  # Decide which variants to build:
  #   push     → only variants whose images/<variant>/ changed (workflow change → all)
  #   dispatch → all
  #   schedule → all only if claude-code has a new version OR a base image digest drifted;
  #              otherwise nothing (empty matrix → build job skipped).
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read            # read labels off published images
    outputs:
      variants: ${{ steps.pick.outputs.variants }}
      version: ${{ steps.ver.outputs.version }}
      date: ${{ steps.ver.outputs.date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2        # need the previous commit to diff on push

      - name: Resolve upstream version
        id: ver
        run: |
          echo "version=$(npm view "$PKG" version)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3   # imagetools inspect (update check)
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pick variants
        id: pick
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          img="ghcr.io/${{ github.repository_owner }}/$IMAGE"
          all=$(ls -d "$THING"/images/*/ | xargs -n1 basename)

          # Resolve a Dockerfile's FROM to a concrete ref (substitutes ${ARG} defaults).
          resolve_base() {
            df="$THING/images/$1/Dockerfile"
            ref=$(grep -m1 -iE '^FROM ' "$df" | awk '{print $2}')
            while echo "$ref" | grep -q '\${'; do
              var=$(echo "$ref" | sed -E 's/.*\$\{([A-Za-z_][A-Za-z0-9_]*)\}.*/\1/')
              def=$(grep -m1 -E "^ARG $var=" "$df" | cut -d= -f2)
              ref=$(echo "$ref" | sed "s#\${$var}#$def#g")
            done
            echo "$ref"
          }
          tag_of() { [ "$1" = "$PRIMARY" ] && echo latest || echo "$1"; }

          selected=""
          case "$EVENT" in
            push)
              if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
                selected="$all"
              else
                changed=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || echo __ALL__)
                if [ "$changed" = __ALL__ ] || printf '%s\n' "$changed" | grep -q '^\.github/workflows/'; then
                  selected="$all"                       # workflow/shared change → rebuild all
                else
                  for v in $all; do
                    printf '%s\n' "$changed" | grep -q "^$THING/images/$v/" && selected="$selected $v" || true
                  done
                fi
              fi ;;
            workflow_dispatch)
              selected="$all" ;;
            schedule)
              # ponytail: fail-safe — any inspect error falls through to "rebuild", never skips silently.
              old_ver=$(docker buildx imagetools inspect "$img:latest" \
                --format '{{ index .Image.Config.Labels "io.tool-containers.claude-version" }}' 2>/dev/null || echo none)
              if [ "$old_ver" != "$VERSION" ]; then
                echo "claude-code: $old_ver -> $VERSION"; selected="$all"
              else
                for v in $all; do
                  cur=$(docker buildx imagetools inspect "$(resolve_base "$v")" \
                    --format '{{.Manifest.Digest}}' 2>/dev/null || echo err)
                  old=$(docker buildx imagetools inspect "$img:$(tag_of "$v")" \
                    --format '{{ index .Image.Config.Labels "io.tool-containers.base-digest" }}' 2>/dev/null || echo missing)
                  if [ "$cur" != "$old" ]; then echo "$v base: $old -> $cur"; selected="$selected $v"; fi
                done
              fi ;;
          esac

          json=$(printf '%s\n' $selected | sed '/^$/d' | jq -R . | jq -cs 'unique')
          echo "variants=$json" >> "$GITHUB_OUTPUT"
          echo "will build: $json"

  build:
    needs: plan
    if: needs.plan.outputs.variants != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # GHCR push
    strategy:
      fail-fast: false          # one variant failing must not cancel the others
      matrix:
        variant: ${{ fromJSON(needs.plan.outputs.variants) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # ponytail: amd64 only — Node/npm SIGILL (exit 132) under QEMU arm64 emulation.
      #           Add arm64 via native ubuntu-24.04-arm runners + manifest merge when needed.

      - name: Resolve base digest
        id: base
        run: |
          df="$THING/images/${{ matrix.variant }}/Dockerfile"
          ref=$(grep -m1 -iE '^FROM ' "$df" | awk '{print $2}')
          while echo "$ref" | grep -q '\${'; do
            var=$(echo "$ref" | sed -E 's/.*\$\{([A-Za-z_][A-Za-z0-9_]*)\}.*/\1/')
            def=$(grep -m1 -E "^ARG $var=" "$df" | cut -d= -f2)
            ref=$(echo "$ref" | sed "s#\${$var}#$def#g")
          done
          echo "digest=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ponytail: Quay disabled for now — re-enable when the account/secrets exist.
      # - name: Login Quay
      #   uses: docker/login-action@v3
      #   with:
      #     registry: quay.io
      #     username: ${{ secrets.QUAY_USERNAME }}
      #     password: ${{ secrets.QUAY_TOKEN }}

      # primary → latest/<version>; others → <variant>/<version>-<variant>.
      # claude-version + base-digest labels feed the scheduled update check.
      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}
            # quay.io/${{ secrets.QUAY_USERNAME }}/${{ env.IMAGE }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.variant == env.PRIMARY }}
            type=raw,value=${{ matrix.variant }},enable=${{ matrix.variant != env.PRIMARY }}
            type=raw,value=${{ needs.plan.outputs.version }}
            type=raw,value=${{ needs.plan.outputs.version }}-${{ needs.plan.outputs.date }}
            type=sha,prefix=sha-
          labels: |
            io.tool-containers.claude-version=${{ needs.plan.outputs.version }}
            io.tool-containers.base-digest=${{ steps.base.outputs.digest }}

      - name: Build & push ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.THING }}/images/${{ matrix.variant }}
          platforms: linux/amd64
          provenance: false     # keep a plain image manifest so label reads (update check) work
          build-args: CLAUDE_CODE_VERSION=${{ needs.plan.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE }}:${{ needs.plan.outputs.version }}${{ matrix.variant == env.PRIMARY && '' || format('-{0}', matrix.variant) }}
          severity: HIGH,CRITICAL
          exit-code: "0"        # report only; flip to "1" to fail on findings
