# docker compose up  → open http://localhost:3773
# Auth the agent from inside the T3 Code UI — no API key env needed.
name: t3code

services:
  t3:
    image: ghcr.io/hambn/t3code:node-slim-agents
    container_name: t3code
    hostname: t3code
    networks: [t3code]
    ports:
      - "3773:3773"
    volumes:
      - ./:/workspace

networks:
  t3code:
    name: t3code
