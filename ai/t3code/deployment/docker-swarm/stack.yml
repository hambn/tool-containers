# Docker Swarm stack. Deploy:
#   docker stack deploy -c stack.yml t3code
# Long-lived web GUI published on port 3773; auth the agent from the T3 Code UI.
version: "3.8"

services:
  t3:
    image: ghcr.io/hambn/t3code:node-slim-agents
    hostname: t3code
    ports:
      - "3773:3773"
    networks:
      - t3code
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

networks:
  t3code:
    driver: overlay
    name: t3code
