# Docker Swarm stack. Create the secret, then deploy:
#   printf '%s' "$ANTHROPIC_API_KEY" | docker secret create t3code_api_key -
#   docker stack deploy -c stack.yml t3code
# Long-lived web GUI published on port 3773; agents read their key from the mounted secret file.
version: "3.8"

services:
  t3:
    image: ghcr.io/hambn/t3code:node-slim-agents
    hostname: t3code
    environment:
      # Claude Code reads the key from the file the secret is mounted at.
      ANTHROPIC_API_KEY_FILE: /run/secrets/t3code_api_key
    secrets:
      - t3code_api_key
    ports:
      - "3773:3773"
    networks:
      - t3code
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

secrets:
  t3code_api_key:
    external: true

networks:
  t3code:
    driver: overlay
    name: t3code
